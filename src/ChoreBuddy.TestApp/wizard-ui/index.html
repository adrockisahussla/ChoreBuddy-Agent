<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>ChoreBuddy Agent Setup</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0f1117; color: #f0f2ff; overflow: hidden; }

  .app { display: flex; flex-direction: column; height: 100vh; }
  header { padding: 18px 24px 8px; text-align: center; }
  h1 { color: #f5c842; font-size: 24px; font-weight: 900; margin: 0; }
  .step-label { color: #7b84a8; font-size: 12px; margin-top: 4px; }

  .admin-banner { padding: 10px 14px; margin: 8px 24px; border-radius: 8px; font-size: 12px; font-weight: 800; text-align: center; }
  .admin-banner.ok { background: #0d3d2a; color: #22c55e; }
  .admin-banner.bad { background: #3d0d0d; color: #ff5e5e; }

  main { flex: 1; overflow-y: auto; padding: 8px 24px 16px; }

  .title { font-size: 20px; font-weight: 900; margin: 14px 0 4px; }
  .subtitle { color: #7b84a8; font-size: 13px; margin: 0 0 16px; }

  .section-label { color: #7b84a8; font-size: 10px; font-weight: 900; letter-spacing: 1.5px; text-transform: uppercase; margin: 18px 0 8px; }

  /* Cards */
  .card { background: #1a1d27; border: 1px solid #2e3350; border-radius: 12px; padding: 14px; margin-bottom: 10px; cursor: pointer; transition: transform 0.08s, border-color 0.15s; }
  .card:hover { border-color: #4a5278; }
  .card.selected { background: #2e2566; border-color: #8b5cf6; }

  .buddy-card { display: flex; align-items: center; gap: 14px; }
  .buddy-avatar { width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 20px; color: #0f1117; flex-shrink: 0; }
  .buddy-name { font-size: 16px; font-weight: 800; }
  .buddy-hint { color: #7b84a8; font-size: 12px; margin-top: 2px; }
  .card.selected .buddy-hint { color: #d4c4ff; }

  /* App rows */
  .app-row { background: #1a1d27; border: 1px solid #2e3350; border-radius: 12px; padding: 12px 14px; margin-bottom: 8px; }
  .app-main { display: flex; align-items: center; gap: 12px; }
  .app-name { flex: 1; font-size: 15px; font-weight: 800; }
  .app-name.disabled { color: #7b84a8; }
  .app-status { font-size: 11px; font-weight: 800; padding: 4px 10px; border-radius: 12px; }
  .app-status.installed { background: #0d3d2a; color: #22c55e; }
  .app-status.notinstalled { background: rgba(123,132,168,0.15); color: #7b84a8; }
  .app-status.custom { background: rgba(245,200,66,0.15); color: #f5c842; }

  /* Big visible toggle */
  .toggle { position: relative; display: inline-block; width: 56px; height: 30px; cursor: pointer; flex-shrink: 0; }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .slider { position: absolute; inset: 0; background: #2e3350; border-radius: 30px; transition: 0.2s; }
  .slider:before { content: ""; position: absolute; height: 24px; width: 24px; left: 3px; top: 3px; background: #fff; border-radius: 50%; transition: 0.2s; }
  .toggle input:checked + .slider { background: #22c55e; }
  .toggle input:checked + .slider:before { transform: translateX(26px); }
  .toggle.disabled .slider { opacity: 0.4; cursor: not-allowed; }

  /* Sub-toggle (kill related) */
  .app-sub { margin-top: 12px; padding-top: 10px; border-top: 1px solid #2e3350; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  .app-sub-label { color: #f5c842; font-size: 13px; font-weight: 700; }

  /* Add custom button */
  .btn-add { width: 100%; background: transparent; color: #f5c842; border: 1.5px dashed #2e3350; border-radius: 12px; padding: 12px; font-size: 13px; font-weight: 800; cursor: pointer; margin-top: 4px; }
  .btn-add:hover { background: #1a1d27; border-color: #f5c842; }

  /* Footer */
  footer { padding: 14px 24px; background: #14182a; display: flex; justify-content: space-between; gap: 12px; border-top: 1px solid #1e2235; }
  .btn { padding: 12px 22px; border-radius: 10px; font-weight: 900; font-size: 14px; cursor: pointer; border: none; min-width: 110px; }
  .btn-back { background: #1a1d27; color: #f0f2ff; border: 1px solid #2e3350; }
  .btn-back:hover { background: #2e3350; }
  .btn-back:disabled { opacity: 0.3; cursor: not-allowed; }
  .btn-next { background: #f5c842; color: #0f1117; }
  .btn-next:hover { filter: brightness(1.1); }
  .btn-next:disabled { opacity: 0.4; cursor: not-allowed; }

  /* Install log */
  .install-status { font-size: 14px; font-weight: 800; color: #f5c842; margin-bottom: 12px; }
  .install-status.done { color: #22c55e; }
  .install-status.error { color: #ff5e5e; }
  .install-log { background: #1a1d27; border: 1px solid #2e3350; border-radius: 10px; padding: 12px; height: 240px; overflow-y: auto; font-family: Consolas, monospace; font-size: 11px; color: #7b84a8; white-space: pre-wrap; }
  .install-log .ok { color: #22c55e; }
  .install-log .err { color: #ff5e5e; }

  /* Done */
  .done-icon { font-size: 64px; text-align: center; margin: 20px 0 10px; }
  .done-h { font-size: 22px; font-weight: 900; text-align: center; margin: 0 0 8px; color: #22c55e; }
  .done-body { color: #7b84a8; font-size: 13px; line-height: 1.6; }
  .done-body ul { padding-left: 18px; }

  /* Welcome */
  .welcome-body { color: #7b84a8; font-size: 13px; line-height: 1.7; }
  .welcome-body ul { padding-left: 18px; margin: 8px 0; }
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>ChoreBuddy Agent</h1>
    <div class="step-label" id="step-label">Step 1 of 4</div>
  </header>

  <div id="admin-banner" class="admin-banner ok" style="display:none">Loading...</div>

  <main id="main"></main>

  <footer>
    <button class="btn btn-back" id="back-btn">← Back</button>
    <button class="btn btn-next" id="next-btn">Next →</button>
  </footer>
</div>

<script src="wizard.js"></script>
</body>
</html>
